        <div class = "randmsg">
        <script>
            var msg;
            var random = Math.floor(Math.random() * 11) + 1;
            if (random == 1) {
                msg = "Every day is a new day.";
            }
            else if (random == 2) {
                msg = "Who do you want in the all star season?.";
            }
            else if (random == 3) {
                msg = "You did well.";
            }  
            else if (random == 4) {
                msg = "You are good enough.";
            }  
            else if (random == 5) {
                msg = "Feed Harry.";
            }  
            else if (random == 6) {
                msg = "Shonee 5th season coming up?";
            }  
            else if (random == 7) {
                msg = "Meow."
            }
            else if (random == 8) {
                msg = "Mary and Lydia were insignificant.";
            }   
           document.write(msg);
        </script>
        </div>
        <p class="datetime"><b>Current date and time is: <span id='date-time'></span></b></p>

        <script>
          function updateDateTime() {
            var dt = new Date();
            
            var options = {
              day: '2-digit',
              month: '2-digit',
              year: 'numeric',
              hour: 'numeric',
              minute: 'numeric',
              second: 'numeric',
              hour12: false,
            };
      
            document.getElementById('date-time').innerHTML = dt.toLocaleString('en-UK', options);
          }
      
          // Update every second (1000 milliseconds)
          setInterval(updateDateTime, 1000);
      
          // Initial update
          updateDateTime();
        </script>
